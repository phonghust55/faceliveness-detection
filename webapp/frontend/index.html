<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Face Liveness Detection - Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        h1 { margin-bottom: 8px; font-size: 28px; }
        p.subtitle { color: #94a3b8; margin-bottom: 24px; }

        .stage {
            position: relative;
            width: 640px;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            background: #000;
        }
        video, canvas#overlay {
            display: block;
            width: 100%;
            height: auto;
        }
        canvas#overlay {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }

        .panel {
            margin-top: 20px;
            width: 640px; max-width: 100%;
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
        }
        .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #334155; }
        .row:last-child { border-bottom: none; }
        .label-tag {
            display: inline-block; padding: 4px 12px; border-radius: 999px;
            font-weight: 600; font-size: 14px;
        }
        .real  { background: #16a34a; color: #fff; }
        .spoof { background: #dc2626; color: #fff; }
        .none  { background: #475569; color: #fff; }

        button {
            margin-top: 16px;
            padding: 10px 20px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Face Liveness Detection</h1>
    <p class="subtitle">Demo môn Xác thực Sinh trắc học - phân biệt mặt thật / mặt giả</p>

    <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="panel">
        <div class="row"><span>Trạng thái:</span> <span id="status">Chưa bật webcam</span></div>
        <div class="row"><span>Khuôn mặt:</span> <span id="found">-</span></div>
        <div class="row"><span>Kết quả:</span> <span id="label" class="label-tag none">-</span></div>
        <div class="row"><span>Confidence:</span> <span id="confidence">-</span></div>
        <div class="row"><span>Score real:</span> <span id="score">-</span></div>
        <div class="row"><span>Inference:</span> <span id="latency">-</span></div>
        <button id="toggle">Bật webcam</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
